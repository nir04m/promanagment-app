services:
  - type: web
    name: promanagement-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    # Render will use this to confirm the service is healthy after deploy
    healthCheckPath: /api/v1/health

    # Auto-deploy is handled by the GitHub Actions deploy hook.
    # Set to false to prevent double-deploys from Render's GitHub integration.
    autoDeploy: false

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      # These must be set manually in the Render dashboard under Environment
      # Do NOT put real values here — this file is committed to git

      - key: DATABASE_URL
        sync: false

      - key: JWT_ACCESS_SECRET
        sync: false

      - key: JWT_REFRESH_SECRET
        sync: false

      - key: JWT_ACCESS_EXPIRES_IN
        value: 1h

      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      - key: CORS_ORIGIN
        sync: false

      - key: RATE_LIMIT_WINDOW_MS
        value: 900000

      - key: RATE_LIMIT_MAX
        value: 1000

      - key: AUTH_RATE_LIMIT_MAX
        value: 80

      - key: API_VERSION
        value: v1

      # Backblaze B2 — set in Render dashboard
      - key: B2_ENDPOINT
        sync: false

      - key: B2_BUCKET_NAME
        sync: false

      - key: B2_BUCKET_REGION
        sync: false

      - key: B2_KEY_ID
        sync: false

      - key: B2_APP_KEY
        sync: false

      # Admin seed user — set in Render dashboard
      - key: ADMIN_EMAIL
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: ADMIN_NAME
        sync: false