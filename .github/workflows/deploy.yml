name: Deploy to Render

on:
  push:
    branches:
      - main

# Only run one deployment at a time — cancel any in-progress run
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:

  # ── Run CI first ───────────────────────────────────────
  ci:
    name: CI checks must pass before deploy
    uses: ./.github/workflows/ci.yml

  # ── Deploy ─────────────────────────────────────────────
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --silent --show-error --fail "$DEPLOY_HOOK"

      - name: Deployment triggered
        run: echo "Render deployment triggered successfully. Monitor progress at https://dashboard.render.com"